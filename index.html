<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EmuArchive - App Player Download</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <script>
        tailwind.config = {
            darkMode: 'media',
            theme: {
                extend: {
                    colors: {
                        lavender: { 50: '#f3e8ff', 100: '#e9d5ff' },
                        navy: { 800: '#1e1b4b', 900: '#0f172a' }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gradient-to-br from-gray-50 via-lavender-50 to-white dark:from-navy-900 dark:via-navy-800 dark:to-gray-900 min-h-screen text-gray-800 dark:text-gray-200 p-4 md:p-8 flex items-center justify-center transition-colors duration-500">
    
    <div id="snake"></div>

    <div class="max-w-7xl w-full glass-panel relative z-10 rounded-[2.5rem] shadow-[0_20px_60px_-15px_rgba(167,139,250,0.3)] dark:shadow-[0_20px_60px_-15px_rgba(0,0,0,0.7)] overflow-hidden flex flex-col h-[90vh]">
        <header class="py-6 px-8 border-b border-purple-200/50 dark:border-gray-700/50 bg-white/40 dark:bg-navy-900/40 flex items-center justify-center gap-4 relative z-10 shadow-sm dark:shadow-none">
            <div class="relative flex items-center justify-center w-12 h-12 rounded-2xl bg-gradient-to-tr from-purple-600 to-indigo-500 shadow-lg shadow-purple-500/40 dark:shadow-purple-900/50 transform rotate-3">
                <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 4h2a8 8 0 018 8v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4a8 8 0 018-8z"></path>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 14h.01M9 14h.01M12 11h.01"></path>
                </svg>
            </div>
            <h1 class="text-3xl font-extrabold tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-purple-700 to-indigo-600 dark:from-purple-400 dark:to-indigo-300">EmuArchive</h1>
        </header>
        <div class="flex flex-col md:flex-row flex-1 overflow-hidden">
            <nav class="md:w-1/3 lg:w-1/4 p-6 bg-white/20 dark:bg-navy-900/20 border-r border-purple-200/50 dark:border-gray-700/50 flex flex-col gap-3 z-10">
                <p class="text-xs font-bold text-gray-400 dark:text-gray-500 mb-2 uppercase tracking-widest pl-2">Select Version</p>
                <button onclick="switchTab('bs5')" id="tab-bs5" class="w-full text-left px-5 py-4 rounded-2xl font-bold flex items-center gap-3 shadow-md bg-gradient-to-r from-lavender-100 to-white dark:from-gray-800 dark:to-navy-800 text-purple-800 dark:text-purple-300 border border-purple-300 dark:border-purple-500/50 relative overflow-hidden group">
                    <div class="absolute inset-0 bg-gradient-to-r from-purple-500/10 to-transparent dark:from-purple-500/20"></div>
                    <span class="relative z-10 flex items-center justify-center w-9 h-9 rounded-full bg-purple-600 dark:bg-purple-500 text-white text-sm shadow-sm">5</span>
                    <span class="relative z-10">App Player 5</span>
                </button>
                <button onclick="switchTab('bs4')" id="tab-bs4" class="w-full text-left px-5 py-4 rounded-2xl font-bold flex items-center gap-3 text-gray-500 dark:text-gray-400 hover:bg-white/60 dark:hover:bg-gray-800/60 hover:text-purple-700 dark:hover:text-purple-300 border border-transparent hover:border-purple-200 dark:hover:border-gray-700 group relative overflow-hidden">
                    <span class="relative z-10 flex items-center justify-center w-9 h-9 rounded-full bg-gray-200 dark:bg-gray-800 text-gray-500 dark:text-gray-400 text-sm">4</span>
                    <span class="relative z-10">App Player 4</span>
                </button>
                
                <div class="mt-auto pt-4">
                    <a href="https://github.com/plathx" target="_blank" class="w-full px-5 py-3.5 rounded-2xl font-bold flex items-center justify-center gap-3 text-white bg-gradient-to-r from-gray-800 to-gray-900 hover:from-black hover:to-gray-800 dark:from-purple-600 dark:to-indigo-600 dark:hover:from-purple-500 dark:hover:to-indigo-500 shadow-lg hover:shadow-xl hover:-translate-y-0.5 transition-all duration-300 group">
                        <svg class="w-6 h-6 group-hover:scale-110 transition-transform duration-300" fill="currentColor" viewBox="0 0 24 24">
                            <path fill-rule="evenodd" d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z" clip-rule="evenodd"></path>
                        </svg>
                        <span>GitHub</span>
                    </a>
                </div>
            </nav>
            <main class="md:w-2/3 lg:w-3/4 p-6 md:p-8 overflow-y-auto z-10 bg-transparent relative">
                <div id="content-bs5" class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-5 fade-in"></div>
                <div id="content-bs4" class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-5 hidden fade-in"></div>
            </main>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
